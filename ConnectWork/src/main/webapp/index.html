<!DOCTYPE html>
<html>
    <head>
        <title>Redirecting to Frontend Login</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <meta http-equiv="refresh" content="0;url=http://localhost:4200/login" />
        <script>
           
            (function(){
                try {
                    window.location.replace('http://localhost:4200/login');
                } catch(e) {}
            })();
        </script>
    </head>
    <body>
        <p>Redirigiendo al login de la aplicación frontend...</p>
        <p>Si no redirige automáticamente, visita <a href="http://localhost:4200/login">http://localhost:4200/login</a></p>
    </body>
</html>
