<div class="solicitudes-container">
  <h1>Solicitudes de Categorías</h1>
 
  <!-- Estado de Carga -->
  <div class="loading-state" *ngIf="$any(this)['cargando']">
    <div class="spinner"></div>
    <p>Cargando solicitudes...</p>
  </div>
 
  <!-- Tabla de Solicitudes -->
  <div class="table-container" *ngIf="!$any(this)['cargando'] && solicitudes && solicitudes.length > 0">
    <table class="table-modern">
      <thead>
        <tr>
          <th>Freelancer</th>
          <th>Categoría Sugerida</th>
          <th>Motivo/Descripción</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let sol of solicitudes; trackBy: $any(this)['trackBySolicitud']">
          <td class="col-cliente">{{ sol.nombreCliente || '-' }}</td>
          <td class="col-categoria"><strong>{{ sol.nombre }}</strong></td>
          <td class="col-descripcion">{{ sol.descripcion || '-' }}</td>
          <td class="col-estado">
            <span class="badge"
              [ngClass]="{
                'badge-warning': sol.estado === 'PENDIENTE',
                'badge-success': sol.estado === 'ACEPTADA',
                'badge-danger': sol.estado === 'RECHAZADA'
              }">
              {{ sol.estado }}
            </span>
          </td>
          <td class="col-acciones">
            <div class="button-group" *ngIf="sol.estado === 'PENDIENTE'">
              <button 
                class="btn-aceptar" 
                (click)="aceptarSolicitud(sol)" 
                title="Aceptar esta solicitud"
                type="button">
                ✓ Aceptar
              </button>
              <button 
                class="btn-rechazar" 
                (click)="rechazarSolicitud(sol)" 
                title="Rechazar esta solicitud"
                type="button">
                ✕ Rechazar
              </button>
            </div>
            <span *ngIf="sol.estado !== 'PENDIENTE'" class="txt-muted">
              Procesada
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
 
  <!-- Estado Vacío -->
  <div class="empty-state" *ngIf="!$any(this)['cargando'] && (!solicitudes || solicitudes.length === 0)">
    <p>No hay solicitudes de categorías pendientes</p>
  </div>
</div>
