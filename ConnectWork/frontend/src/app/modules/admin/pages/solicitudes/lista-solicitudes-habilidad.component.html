<div class="solicitudes-container">
  <h1>⚙️ Solicitudes de Habilidades</h1>

  <div class="table-container" *ngIf="solicitudes.length > 0">
    <table class="table">
      <thead>
        <tr>
          <th>Freelancer</th>
          <th>Habilidad Solicitada</th>
          <th>Descripción</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let sol of solicitudes">
          <td>{{ sol.nombreFreelancer }}</td>
          <td>{{ sol.nombre }}</td>
          <td>{{ sol.descripcion || '-' }}</td>
          <td>
            <span class="badge"
              [ngClass]="'badge-' + (sol.estado === 'PENDIENTE' ? 'warning' : (sol.estado || '').toLowerCase())">
              {{ sol.estado }}
            </span>
          </td>
          <td class="acciones">
            <button
              *ngIf="sol.estado === 'PENDIENTE'"
              class="btn-aceptar"
              (click)="aceptarSolicitud(sol)">
              ✓ Aceptar
            </button>
            <button
              *ngIf="sol.estado === 'PENDIENTE'"
              class="btn-rechazar"
              (click)="rechazarSolicitud(sol)">
              ✕ Rechazar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="solicitudes.length === 0" class="empty-state">
    <p>No hay solicitudes de habilidades pendientes</p>
  </div>
</div>
