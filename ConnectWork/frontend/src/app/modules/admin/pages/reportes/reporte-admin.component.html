<div class="reportes-container">
  <div class="header">
    <h1>📊 Reportes y Estadísticas</h1>
    <div class="filtros">
      <input type="date" [(ngModel)]="fechaInicio">
      <input type="date" [(ngModel)]="fechaFin">
      <button class="btn-generar" (click)="generarReporte()">Generar PDF</button>
    </div>
  </div>

  <div class="grid-reportes">
    <!-- Top Habilidades -->
    <div class="card-reporte">
      <h3>Habilidades más demandadas</h3>
      <table class="table-mini">
        <thead>
          <tr>
            <th>Habilidad</th>
            <th>Uso</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of topHabilidades">
            <td>{{ item.nombre }}</td>
            <td>{{ item.cantidad }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Usuarios Destacados -->
    <div class="card-reporte">
      <h3>Freelancers mejor calificados</h3>
      <div class="user-list">
        <div class="user-item" *ngFor="let user of topFreelancers">
          <span class="user-name">{{ user.nombre }}</span>
          <span class="user-rating">⭐ {{ user.rating }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="full-card">
    <h3>Proyectos por Estado</h3>
    <div class="chart-placeholder">
      <!-- Aquí podrías integrar Chart.js o similar -->
      <div class="bar-container" *ngFor="let p of proyectosEstado">
        <label>{{ p.estado }}</label>
        <div class="bar-bg">
          <div class="bar-fill" [style.width.%]="p.porcentaje"></div>
        </div>
        <span>{{ p.cantidad }}</span>
      </div>
    </div>
  </div>
</div>
