<div class="categorias-container">
  <div class="categorias-header">
    <h1>🏷️ Gestionar Categorías</h1>
    <button class="btn-nueva" (click)="abrirFormulario()">+ Nueva Categoría</button>
  </div>

  <!-- Formulario Modal -->
  <app-formulario-categoria
    *ngIf="mostrarFormulario"
    [categoria]="categoriaEditando"
    (guardado)="onCategoriaGuardada()"
    (cancelado)="cerrarFormulario()">
  </app-formulario-categoria>

  <div class="table-container">
    <table class="table" *ngIf="categorias.length > 0">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cat of categorias">
          <td>{{ cat.nombre }}</td>
          <td>{{ cat.descripcion || '-' }}</td>
          <td>
            <span class="estado" [ngClass]="cat.activo ? 'activo' : 'inactivo'">
              {{ cat.activo ? '✓ Activo' : '✕ Inactivo' }}
            </span>
          </td>
          <td class="acciones">
            <button class="btn-sm" (click)="editarCategoria(cat)">Editar</button>
            <button class="btn-sm" (click)="abrirModalEliminar(cat)">
              {{ cat.activo ? 'Desactivar' : 'Activar' }}
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="categorias.length === 0" class="empty-state">
      <p>No hay categorías</p>
    </div>
  </div>

  <app-modal-confirmar
    [visible]="modalEliminarAbierto"
    titulo="Confirmar acción"
    [mensaje]="'¿Estás seguro de ' + (categoriaSeleccionada?.activo ? 'desactivar' : 'activar') + ' esta categoría?'"
    [tipo]="categoriaSeleccionada?.activo ? 'peligro' : 'normal'"
    (confirm)="confirmarAccion()"
    (cancel)="cerrarModalEliminar()">
  </app-modal-confirmar>
</div>
