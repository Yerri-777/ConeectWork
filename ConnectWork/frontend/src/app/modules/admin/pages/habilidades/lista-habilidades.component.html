<div class="habilidades-container">
  <div class="habilidades-header">
    <h1>🛠️ Gestionar Habilidades</h1>
    <button class="btn-nueva" (click)="abrirFormulario()" [disabled]="cargando">
      + Nueva Habilidad
    </button>
  </div>

  <!-- Componente de Formulario (Modal) -->
  <app-formulario-habilidad
    *ngIf="mostrarFormulario"
    [habilidad]="habilidadEditando"
    (guardado)="onHabilidadGuardada()"
    (cancelado)="cerrarFormulario()">
  </app-formulario-habilidad>

  <div class="table-container">
    <!-- Indicador de carga visual opcional -->
    <div *ngIf="cargando && habilidades.length === 0" class="loading-state">
      <p>Cargando información...</p>
    </div>

    <table class="table" *ngIf="!cargando && habilidades.length > 0">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Categoría</th>
          <th>Descripción</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let hab of habilidades">
          <td><strong>{{ hab.nombre }}</strong></td>
          <td>
            <span class="categoria-badge">{{ hab.nombreCategoria || 'Sin categoría' }}</span>
          </td>
          <td class="text-muted">{{ hab.descripcion || '-' }}</td>
          <td>
            <span class="estado" [ngClass]="hab.activo ? 'activo' : 'inactivo'">
              {{ hab.activo ? '✓ Activo' : '✕ Inactivo' }}
            </span>
          </td>
          <td class="acciones">
            <button class="btn-sm btn-edit" (click)="editarHabilidad(hab)">
              Editar
            </button>
            <button
              class="btn-sm"
              [ngClass]="hab.activo ? 'btn-danger' : 'btn-success'"
              (click)="abrirModalEliminar(hab)">
              {{ hab.activo ? 'Desactivar' : 'Activar' }}
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="!cargando && habilidades.length === 0" class="empty-state">
      <p>No se encontraron habilidades registradas.</p>
    </div>
  </div>

  <!-- Modal de Confirmación para Activar/Desactivar -->
  <app-modal-confirmar
    [visible]="modalEliminarAbierto"
    titulo="Confirmar acción"
    [mensaje]="'¿Estás seguro de que deseas ' + (habilidadSeleccionada?.activo ? 'desactivar' : 'activar') + ' la habilidad: ' + habilidadSeleccionada?.nombre + '?'"
    [tipo]="habilidadSeleccionada?.activo ? 'peligro' : 'normal'"
    (confirm)="confirmarAccion()"
    (cancel)="cerrarModalEliminar()">
  </app-modal-confirmar>
</div>
