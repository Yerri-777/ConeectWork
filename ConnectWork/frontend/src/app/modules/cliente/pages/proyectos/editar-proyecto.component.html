<div class="proyectos-container">

  <div
    class="form-card"
    *ngIf="!cargando; else loader">

    <div class="header-flex">

      <div>

        <h2>
          Editar Proyecto
        </h2>

        <p class="sub-title">
          Actualiza la información del proyecto
        </p>

      </div>

      <span class="badge badge-proceso">

        ID: {{ proyectoId || 0 }}

      </span>

    </div>

    <form
      [formGroup]="proyectoForm"
      (ngSubmit)="onSubmit()">

      <div class="form-group">

        <label>
          Título del Proyecto
        </label>

        <input
          type="text"
          formControlName="titulo"
          placeholder="Ej: Sistema Web Administrativo">

        <small
          class="error-text"
          *ngIf="campoInvalido('titulo')">

          {{ obtenerError('titulo') }}

        </small>

      </div>

      <div class="form-group">

        <label>
          Descripción
        </label>

        <textarea
          rows="7"
          formControlName="descripcion"
          placeholder="Describe el proyecto">
        </textarea>

        <small
          class="error-text"
          *ngIf="campoInvalido('descripcion')">

          {{ obtenerError('descripcion') }}

        </small>

      </div>

      <div class="grid-form">

        <div class="form-group">

          <label>
            Presupuesto Mínimo
          </label>

          <input
            type="number"
            formControlName="presupuestoMin">

        </div>

        <div class="form-group">

          <label>
            Presupuesto Máximo
          </label>

          <input
            type="number"
            formControlName="presupuestoMax">

        </div>

      </div>

      <div class="form-group">

        <label>
          Categoría
        </label>

        <select formControlName="categoria">

          <option
            *ngFor="let categoria of categorias"
            [value]="categoria">

            {{ categoria }}

          </option>

        </select>

      </div>

      <div class="form-group">

        <label>
          Tiempo de Entrega
        </label>

        <input
          type="number"
          formControlName="plazoDias">

      </div>

      <div class="form-group">

        <label>
          Habilidades
        </label>

        <div class="habilidades-grid">

          <button
            type="button"
            *ngFor="let habilidad of habilidadesDisponibles"
            class="habilidad-chip"
            [class.selected]="tieneHabilidad(habilidad)"
            (click)="toggleHabilidad(habilidad)">

            {{ habilidad }}

          </button>

        </div>

      </div>

      <div class="acciones-form">

        <button
          type="submit"
          class="btn-primary"
          [disabled]="proyectoForm.invalid || guardando">

          {{ guardando ? 'Guardando...' : 'Actualizar Proyecto' }}

        </button>

        <button
          type="button"
          class="btn-outline"
          (click)="cancelar()">

          Cancelar

        </button>

      </div>

    </form>

  </div>

  <ng-template #loader>

    <div class="table-card loader-card">

      <p>
        Cargando proyecto...
      </p>

    </div>

  </ng-template>

</div>
