<div class="proyectos-container">
  <div class="form-card">
    <h2>Publicar Nuevo Proyecto</h2>
    <form [formGroup]="proyectoForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Título del Proyecto</label>
        <input type="text" formControlName="titulo" placeholder="Ej: Desarrollo App Móvil">
      </div>

      <div class="form-group">
        <label>Descripción Detallada</label>
        <textarea formControlName="descripcion" rows="5"></textarea>
      </div>

      <div class="grid-form">
        <div class="form-group">
          <label>Presupuesto (GTQ)</label>
          <input type="number" formControlName="presupuesto">
        </div>
        <div class="form-group">
          <label>Categoría</label>
          <select formControlName="categoria">
            <option value="web">Desarrollo Web</option>
            <option value="diseño">Diseño Gráfico</option>
            <option value="mobile">Mobile</option>
          </select>
        </div>
      </div>

      <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button type="submit" class="btn-primary" [disabled]="proyectoForm.invalid">Publicar</button>
        <button type="button" class="btn-outline" routerLink="..">Cancelar</button>
      </div>
    </form>
  </div>
</div>
