<div class="entregas-container">

  <div
    class="form-card"
    style="
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    "
  >

    <!-- HEADER -->
    <div
      style="
        text-align: center;
        margin-bottom: 30px;
      "
    >

      <div
        style="
          font-size: 55px;
          margin-bottom: 10px;
        "
      >

      </div>

      <h2
        style="
          margin: 0;
          color: #2c3e50;
          font-size: 30px;
          font-weight: 700;
        "
      >
        ¡Proyecto Completado!
      </h2>

      <p
        style="
          color: #7f8c8d;
          margin-top: 10px;
          font-size: 15px;
        "
      >
        Tu opinión ayuda a mejorar la comunidad
        de ConnectWork y reconocer a los mejores freelancers.
      </p>

    </div>

    <!-- FORM -->
    <div>

      <!-- CALIFICACIÓN -->
      <div
        class="seccion-calificacion"
        style="
          text-align: center;
          margin-bottom: 30px;
        "
      >

        <label
          style="
            display: block;
            margin-bottom: 15px;
            font-weight: 600;
            color: #34495e;
            font-size: 16px;
          "
        >
          ¿Cómo calificarías el desempeño del freelancer?
        </label>

        <!-- ESTRELLAS -->
        <div
          class="stars-container"
          style="
            justify-content: center;
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
          "
        >

          <span

            *ngFor="let s of [1,2,3,4,5]"

            class="star"

            [class.active]="puntuacion >= s"

            (click)="setRating(s)"

            style="
              font-size: 50px;
              cursor: pointer;
              transition: transform 0.2s ease;
              user-select: none;
            "
          >
            ★
          </span>

        </div>

        <!-- TEXTO RATING -->
        <div
          *ngIf="puntuacion"
          style="
            margin-bottom: 20px;
            font-weight: 600;
            color: #f39c12;
            font-size: 16px;
          "
        >

          {{
            calificacionService.obtenerTextoCalificacion(
              puntuacion
            )
          }}

        </div>

      </div>

      <!-- COMENTARIO -->
      <div
        class="form-group"
        style="
          text-align: left;
          margin-bottom: 25px;
        "
      >

        <label
          style="
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #34495e;
          "
        >
          Deja un comentario sobre tu experiencia:
        </label>

        <textarea

          [(ngModel)]="comentario"
          name="comentario"

          rows="5"

          placeholder="Ej: Excelente comunicación y entrega puntual. Muy profesional..."

          style="
            width: 100%;
            padding: 15px;
            border: 2px solid #edf2f7;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            resize: vertical;
            transition: border-color 0.3s;
            box-sizing: border-box;
          "
        >
        </textarea>

      </div>

      <!-- BOTONES -->
      <div
        style="
          margin-top: 30px;
          display: flex;
          flex-direction: column;
          gap: 12px;
        "
      >

        <!-- PUBLICAR -->
        <button

          type="button"

          (click)="enviarCalificacion()"

          [disabled]="
            puntuacion === 0 ||
            guardando
          "

          class="btn-primary"

          style="
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(
              135deg,
              #27ae60 0%,
              #2ecc71 100%
            );
          "
        >

          {{
            guardando
              ? 'Publicando...'
              : 'Publicar Calificación'
          }}

        </button>

        <!-- OMITIR -->
        <button

          type="button"

          class="btn-outline"

          (click)="router.navigate(['/cliente/dashboard'])"

          [disabled]="guardando"

          style="
            border: none;
            color: #95a5a6;
            background: transparent;
            cursor: pointer;
            padding: 10px;
            font-size: 14px;
          "
        >

          Omitir por ahora

        </button>

      </div>

    </div>

  </div>

</div>
