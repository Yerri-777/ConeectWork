<div class="saldo-container">

  <div class="card-white recarga-card">

    <div class="recarga-header">

      <h2>
        Recargar Saldo
      </h2>

      <p>
        Agrega fondos a tu cuenta para contratar freelancers.
      </p>

    </div>

    <!-- MONTO -->
    <div class="form-group">

      <label>
        Monto a recargar
      </label>

      <input
        type="number"
        min="1"
        class="input-recarga"
        [(ngModel)]="monto"
        placeholder="Q0.00">

    </div>

    <!-- PREVIEW -->
    <div class="preview-box">

      <span>
        Total a acreditar:
      </span>

      <strong>
        {{ (monto || 0) | currency:'GTQ' }}
      </strong>

    </div>

    <!-- BOTONES -->
    <div class="acciones-flex">

      <!-- CONFIRMAR -->
      <button
        type="button"
        class="btn-primary"
        (click)="confirmarRecarga()"
        [disabled]="procesando || monto <= 0">

        {{

          procesando
            ? 'Procesando...'
            : 'Confirmar Recarga'

        }}

      </button>

      <!-- CANCELAR -->
      <button
        type="button"
        class="btn-outline"
        (click)="cancelar()"
        [disabled]="procesando">

        Cancelar

      </button>

    </div>

  </div>

</div>
