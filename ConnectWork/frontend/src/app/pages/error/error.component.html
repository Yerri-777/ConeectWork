<div class="error-wrapper" [@fadeIn]>
  <div class="error-card">
    <div class="error-icon-container">
      <span class="error-icon"></span>
    </div>

    <h1 class="error-code">Error {{ codigoError }}</h1>
    <h2>¡Ups! Algo salió mal</h2>

    <p class="error-text">
      {{ mensajeError }}
    </p>

    <div class="action-buttons">
      <button (click)="reintentar()" class="btn-retry">
        Reintentar
      </button>
      <a routerLink="/" class="btn-home">
       Volver al Inicio
      </a>
    </div>

    <div class="support-info">
      <p>Si el problema persiste, por favor contacta a soporte técnico.</p>
      <span class="support-id">ID de Rastreo: #ERR-{{ currentTimestamp }}</span>
    </div>
  </div>
</div>
